<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-ray Void Cal v4.0 - Ultimate Performance</title>
    <style>
        /* ================= UI 樣式設定 ================= */
        body {
            background-color: #1e1e1e;
            color: #cccccc;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .top-bar {
            height: 35px;
            background-color: #181818;
            display: flex;
            align-items: center;
            padding: 0 15px;
            border-bottom: 1px solid #333;
            z-index: 100;
        }

        .top-bar .title {
            color: #888;
            font-size: 13px;
            margin-left: auto;
            margin-right: 15px;
        }

        .menu-item {
            padding: 8px 15px;
            font-size: 13px;
            cursor: pointer;
            color: #ccc;
            position: relative;
        }

        .menu-item:hover {
            background-color: #333333;
            color: #fff;
        }

        .workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 360px;
            min-width: 360px;
            background-color: #252526;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #333;
            z-index: 10;
            order: 2;
        }

        .tabs {
            display: flex;
            background-color: #2d2d2d;
        }

        .tab {
            flex: 1;
            padding: 12px 0;
            text-align: center;
            cursor: pointer;
            font-size: 14px;
            color: #888;
            border-bottom: 2px solid transparent;
        }

        .tab.active {
            color: #fff;
            background-color: #252526;
            border-bottom: 2px solid #007acc;
        }

        .tab:hover:not(.active) {
            color: #ccc;
            background-color: #333;
        }

        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .tab-content::-webkit-scrollbar {
            width: 8px;
        }

        .tab-content::-webkit-scrollbar-thumb {
            background: #454545;
            border-radius: 4px;
        }

        .panel-box {
            background-color: #333333;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #454545;
            margin-bottom: 15px;
        }

        h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #fff;
            border-bottom: 1px solid #454545;
            padding-bottom: 5px;
        }

        label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #aaa;
            margin: 8px 0 2px;
        }

        .val-text {
            color: #d7ba7d;
            font-weight: bold;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            margin: 5px 0;
            cursor: pointer;
        }

        .btn {
            background-color: #3c3c3c;
            color: #ccc;
            border: none;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-size: 13px;
        }

        .btn:hover {
            background-color: #4d4d4d;
        }

        .btn.primary {
            background-color: #0e639c;
            color: #fff;
            margin-top: 10px;
            padding: 10px;
        }

        .btn.primary:hover {
            background-color: #1177bb;
        }

        .tool-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            margin-bottom: 10px;
        }

        .tool-btn {
            background-color: #3c3c3c;
            border: none;
            color: #ccc;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .tool-btn.active {
            background-color: #094771;
            color: #fff;
            border: 1px solid #007acc;
        }

        .bottom-panel {
            padding: 15px;
            background-color: #252526;
            border-top: 1px solid #333;
        }

        .void-rate {
            font-size: 28px;
            font-weight: bold;
            color: #89d185;
            text-align: center;
        }

        .void-rate.danger {
            color: #f14c4c;
        }

        #status {
            font-size: 11px;
            color: #d7ba7d;
            font-weight: bold;
            margin-bottom: 5px;
            line-height: 1.2;
            word-wrap: break-word;
        }

        .canvas-wrapper {
            flex: 1;
            position: relative;
            background-color: #111;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
            cursor: crosshair;
            order: 1;
        }

        #viewCanvas {
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            image-rendering: pixelated;
        }

        #contextMenu {
            position: absolute;
            background-color: #454545;
            padding: 1px;
            border-radius: 6px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 9999;
        }

        .cm-inner {
            background-color: #252526;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
        }

        .cm-item {
            padding: 10px 25px;
            color: #ccc;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cm-item:hover {
            background-color: #094771;
            color: #fff;
        }

        .cm-item.active::before {
            content: "●";
            color: #007acc;
            font-size: 10px;
        }

        .cm-item:not(.active)::before {
            content: "○";
            color: transparent;
            font-size: 10px;
        }

        #hiddenContainer {
            display: none;
        }
    </style>
</head>

<body>

    <div class="top-bar">
        <div style="color: #007acc; font-size: 16px; margin-right: 15px;">💠</div>
        <div class="menu-item" onclick="document.getElementById('fileInput').click()" id="menu-open">📁 選擇圖檔</div>
        <div class="menu-item" onclick="document.getElementById('projectInput').click()" id="menu-load">📂 載入專案</div>
        <div class="menu-item" onclick="saveProject()" id="menu-save">💾 儲存專案</div>
        <div class="menu-item" onclick="exportReport()" id="menu-export">📊 匯出報表</div>
        <div class="menu-item" style="position: relative;" onclick="toggleLangMenu()" id="menu-lang">🌐 語言 ▼
            <div id="langMenu"
                style="display: none; position: absolute; top: 100%; left: 0; background: #333; border: 1px solid #454545; z-index: 1000; min-width: 100px;">
                <div class="cm-item" onclick="setLang('zh-TW', event)">繁體中文</div>
                <div class="cm-item" onclick="setLang('zh-CN', event)">简体中文</div>
                <div class="cm-item" onclick="setLang('en', event)">English</div>
                <div class="cm-item" onclick="setLang('ja', event)">日本語</div>
                <div class="cm-item" onclick="setLang('ko', event)">한국어</div>
                <div class="cm-item" onclick="setLang('fr', event)">Français</div>
                <div class="cm-item" onclick="setLang('de', event)">Deutsch</div>
            </div>
        </div>
        <div class="menu-item" onclick="showHelp()" id="menu-help">❓ 說明</div>
        <div class="title" id="main-title">X-ray Void Cal v4.0</div>
    </div>
    <input type="file" id="fileInput" accept="image/*" style="display: none;">
    <input type="file" id="projectInput" accept=".vod" style="display: none;" onchange="loadProject(event)">

    <div class="workspace">
        <div class="sidebar">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('tabImg')">影像</div>
                <div class="tab" onclick="switchTab('tabVoid')">氣泡</div>
                <div class="tab" onclick="switchTab('tabEdit')">編修</div>
            </div>

            <div id="tabImg" class="tab-content active">
                <div class="panel-box">
                    <h3>影像狀態與預處理</h3>
                    <label class="checkbox-group"><input type="checkbox" id="chkInv" onchange="triggerPipeline(1)">
                        正負片反轉</label>
                    <label class="checkbox-group"><input type="checkbox" id="chkClahe" checked
                            onchange="triggerPipeline(1)"> 強化對比 (CLAHE)</label>

                    <input type="range" id="slClahe" min="1.0" max="10.0" step="0.1" value="2.0"
                        oninput="document.getElementById('vClahe').innerText=this.value; triggerPipeline(1, true, true);"
                        onchange="triggerPipeline(1)">

                    <label><span>條紋過濾 (De-stripe)</span> <span id="vDestripe" class="val-text">0</span></label>
                    <input type="range" id="slDestripe" min="0" max="20" step="1" value="0"
                        oninput="document.getElementById('vDestripe').innerText=this.value; triggerPipeline(1, true, true);"
                        onchange="triggerPipeline(1)">

                    <label><span>畫面縮放 (Zoom)</span> <span id="vZoom" class="val-text">1.0</span></label>
                    <input type="range" id="slZoom" min="0.1" max="10.0" step="0.1" value="1.0"
                        oninput="document.getElementById('vZoom').innerText=parseFloat(this.value).toFixed(1); setZoomFromSlider(this.value);">

                    <label><span>銳化增強 (Sharpen)</span> <span id="vSharp" class="val-text">0</span></label>
                    <input type="range" id="slSharp" min="0" max="5" step="0.1" value="0"
                        oninput="document.getElementById('vSharp').innerText=this.value; triggerPipeline(1, true, true);"
                        onchange="triggerPipeline(1)">

                    <label><span>亮度/對比 (Alpha)</span> <span id="vAlpha" class="val-text">1.0</span></label>
                    <input type="range" id="slAlpha" min="0.5" max="3.0" step="0.1" value="1.0"
                        oninput="document.getElementById('vAlpha').innerText=this.value; triggerPipeline(1, true, true);"
                        onchange="triggerPipeline(1)">

                    <label><span>對比 Gamma</span> <span id="vGamma" class="val-text">1.0</span></label>
                    <input type="range" id="slGamma" min="0.1" max="3.0" step="0.1" value="1.0"
                        oninput="document.getElementById('vGamma').innerText=this.value; triggerPipeline(1, true, true);"
                        onchange="triggerPipeline(1)">
                </div>
            </div>

            <div id="tabVoid" class="tab-content">
                <div class="panel-box">
                    <h3>智能氣泡檢測參數</h3>
                    <label><span>核心敏感度 (Kernel)</span> <span id="vKernel" class="val-text">21</span></label>
                    <input type="range" id="slKernel" min="3" max="51" step="2" value="21"
                        oninput="document.getElementById('vKernel').innerText=this.value; triggerPipeline(2, true, true);"
                        onchange="triggerPipeline(2)">

                    <label><span>雜訊平滑 (Morph)</span> <span id="vMorph" class="val-text">2</span></label>
                    <input type="range" id="slMorph" min="0" max="15" step="1" value="2"
                        oninput="document.getElementById('vMorph').innerText=this.value; triggerPipeline(2, true, true);"
                        onchange="triggerPipeline(2)">

                    <label><span>最小面積 (Min Area)</span> <span id="vArea" class="val-text">10</span></label>
                    <input type="range" id="slArea" min="1" max="500" step="1" value="10"
                        oninput="document.getElementById('vArea').innerText=this.value; triggerPipeline(3, true, true);"
                        onchange="triggerPipeline(3)">

                    <label><span>最小圓形度 (Circularity)</span> <span id="vCirc" class="val-text">0.40</span></label>
                    <input type="range" id="slCirc" min="0.1" max="1.0" step="0.05" value="0.40"
                        oninput="document.getElementById('vCirc').innerText=this.value; triggerPipeline(3, true, true);"
                        onchange="triggerPipeline(3)">

                    <div class="tool-grid" style="margin-top: 15px;">
                        <button class="btn primary" style="margin-top:0;" onclick="autoHeuristicSearch()"
                            id="btn-auto-opt">🤖 自動最佳化</button>
                        <button class="btn" onclick="accumulateMask()" id="btn-accumulate">➕ 鎖定並疊加</button>
                    </div>
                </div>
                <div class="panel-box">
                    <h3>🔥 聯合檢測引擎</h3>
                    <label class="checkbox-group"><input type="checkbox" id="chkOtsu" checked
                            onchange="triggerPipeline(2)"> 全局閥值 (Global Thresh) <span id="vThresh" class="val-text"
                            style="margin-left: auto;">20</span></label>
                    <input type="range" id="slThresh" min="1" max="100" step="1" value="20"
                        oninput="document.getElementById('vThresh').innerText=this.value; triggerPipeline(2, true, true);"
                        onchange="triggerPipeline(2)">

                    <label class="checkbox-group"><input type="checkbox" id="chkCanny" onchange="triggerPipeline(2)">
                        邊緣檢測 (Canny Edge) <span id="vCannyM" class="val-text"
                            style="margin-left: auto;">9</span></label>
                    <input type="range" id="slCannyM" min="1" max="21" step="2" value="9"
                        oninput="document.getElementById('vCannyM').innerText=this.value; triggerPipeline(2, true, true);"
                        onchange="triggerPipeline(2)">

                    <label class="checkbox-group"><input type="checkbox" id="chkAdapt" onchange="triggerPipeline(2)">
                        自適應檢測 (Adaptive) <span id="vAdaptC" class="val-text"
                            style="margin-left: auto;">-5</span></label>
                    <input type="range" id="slAdaptC" min="-20" max="20" step="1" value="-5"
                        oninput="document.getElementById('vAdaptC').innerText=this.value; triggerPipeline(2, true, true);"
                        onchange="triggerPipeline(2)">
                </div>
            </div>

            <div id="tabEdit" class="tab-content">
                <div class="panel-box">
                    <h3>檢視控制</h3>
                    <label class="checkbox-group"><input type="checkbox" id="chkShowMask" checked onchange="drawView()">
                        顯示紅光遮罩</label>
                    <label class="checkbox-group"><input type="checkbox" id="chkShowLabels" onchange="drawView()">
                        顯示各氣泡編號與佔比</label>
                    <label class="checkbox-group"><input type="checkbox" id="chkSolid" checked
                            onchange="triggerPipeline(3)">
                        氣泡實心化 (Solidify)</label>
                    <label>遮罩透明度: <span id="vOpacity" class="val-text">0.7</span></label>
                    <input type="range" id="slOpacity" min="0.0" max="1.0" step="0.1" value="0.7"
                        oninput="document.getElementById('vOpacity').innerText=this.value; drawView();">
                </div>

                <div class="panel-box">
                    <h3>手動編修工具</h3>
                    <div class="tool-grid">
                        <button class="tool-btn active" id="tool-pan" onclick="setMode('pan')">✋ 平移 (Pan)</button>
                        <button class="tool-btn" id="tool-roi" onclick="setMode('roi')">🎯 框選 (ROI)</button>
                        <button class="tool-btn" id="tool-draw" onclick="setMode('draw')">🖌️ 補點 (Draw)</button>
                        <button class="tool-btn" id="tool-erase" onclick="setMode('erase')">🧼 擦除 (Erase)</button>
                        <button class="tool-btn" id="tool-fill" onclick="setMode('fill')"
                            style="grid-column: span 2;">🪣 智慧填滿 (Fill)</button>
                    </div>

                    <label>畫筆尺寸 (滾輪可調): <span id="vBrush" class="val-text">10</span></label>
                    <input type="range" id="slBrush" min="1" max="100" value="10"
                        oninput="document.getElementById('vBrush').innerText=this.value; drawView();">

                    <label><span>斷點接合 (Gap Fill)</span> <span id="vGap" class="val-text">0</span></label>
                    <input type="range" id="slGap" min="0" max="20" step="1" value="0"
                        oninput="document.getElementById('vGap').innerText=this.value; triggerPipeline(3, true, true);"
                        onchange="triggerPipeline(3)">

                    <label>填滿寬容度 (滾輪可調): <span id="vFillTol" class="val-text">15</span></label>
                    <input type="range" id="slFillTol" min="0" max="100" value="15"
                        oninput="document.getElementById('vFillTol').innerText=this.value; updateFillPreview();">

                    <div class="tool-grid" style="margin-top: 15px;">
                        <button class="btn" onclick="undoFill()">↩️ 復原油漆桶</button>
                        <button class="btn" onclick="clearUserMask()">🗑️ 清空手動修改</button>
                    </div>
                </div>
            </div>

            <div class="bottom-panel">
                <div id="status">⏳ 等待載入 OpenCV...</div>
                <label class="checkbox-group" style="margin-bottom: 8px; margin-top: 8px;"><input type="checkbox"
                        id="chkWatermark" checked> 報表加入浮水印 (Watermark)</label>
                <label>空洞判定門檻 (%): <span id="vLimit" class="val-text">10</span></label>
                <input type="range" id="slLimit" min="0" max="100" value="10"
                    oninput="document.getElementById('vLimit').innerText=this.value; updateResultColor();">
                <div id="voidResult" class="void-rate">Void rate : -- %</div>
            </div>
        </div>

        <div class="canvas-wrapper" id="canvasWrapper" tabindex="0">
            <canvas id="viewCanvas"></canvas>
        </div>
    </div>

    <div id="hiddenContainer">
        <canvas id="canvasImgRaw"></canvas>
        <canvas id="canvasUserMask"></canvas>
        <canvas id="canvasAccumulatedMask"></canvas>
    </div>

    <div id="contextMenu">
        <div class="cm-inner">
            <div class="cm-item active" id="cm-pan" onclick="setMode('pan')">平移畫面</div>
            <div class="cm-item" id="cm-roi" onclick="setMode('roi')">框選 / 縮放晶片</div>
            <div class="cm-item" id="cm-draw" onclick="setMode('draw')">手動補點</div>
            <div class="cm-item" id="cm-erase" onclick="setMode('erase')">手動擦除</div>
            <div class="cm-item" id="cm-fill" onclick="setMode('fill')">智慧填滿 (油漆桶)</div>
        </div>
    </div>

    <script>
        var Module = {
            onRuntimeInitialized: function () {
                isCvReady = true;
                document.getElementById('status').innerText = "✔️ 系統就緒";
                document.getElementById('status').style.color = "#89d185";
            }
        };
    </script>
    <script async src="https://docs.opencv.org/4.8.0/opencv.js"></script>

    <script>
        // ================= 核心變數 =================
        let isCvReady = false;
        let isProjectLoading = false;
        let img = new Image();

        let matRaw = null;
        let matPreprocessed = null;
        let baseThreshData = null;
        let globalFilteredData = null;
        let baseThreshW = 0, baseThreshH = 0;
        let globalIsPadded = false;
        let globalPadX = 0, globalPadY = 0, globalPadW = 0, globalPadH = 0;

        let voidLabels = [];
        let currentVoidRate = 0;

        let bgCanvas = document.createElement('canvas');
        let resultCanvas = document.createElement('canvas');
        let userMaskCtx = document.getElementById('canvasUserMask').getContext('2d', { willReadFrequently: true });

        let transform = { scale: 1, x: 0, y: 0 };
        let mode = 'pan';
        let roi = null;
        let lastDrawnRoi = null;

        let isDragging = false;
        let dragMode = null;
        let dragStartScreen = { x: 0, y: 0 };
        let dragStartTransform = { x: 0, y: 0 };
        let dragStartRoi = null;
        let mousePos = { x: 0, y: 0 }, mouseImgPos = { x: 0, y: 0 };
        let tempRoi = null;
        let lastPaintPos = null;

        let fillPreviewActive = false;
        let fillSeed = null;
        let fillTargetType = 255;
        let fillYellowCanvas = document.createElement('canvas');
        let compMaskData = null;
        let lastFillMaskData = null;

        let pipeTimer = null;
        let isProcessing = false;
        let pendingProcessLevel = 0;
        let lastProcTime = 0;

        // ================= UI 邏輯 =================
        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        function setMode(newMode) {
            mode = newMode;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tool-' + mode).classList.add('active');
            document.querySelectorAll('.cm-item').forEach(i => i.classList.remove('active'));
            document.getElementById('cm-' + mode).classList.add('active');
            document.getElementById('contextMenu').style.display = 'none';
            cancelFillPreview(); drawView();
        }

        function updateResultColor() {
            let resultText = document.getElementById('voidResult').innerText;
            let r = parseFloat(resultText.replace("Void rate : ", ""));
            let l = parseFloat(document.getElementById('slLimit').value);
            document.getElementById('voidResult').className = (r > l) ? "void-rate danger" : "void-rate";
        }

        function clearUserMask() {
            if (!img.src) return;
            userMaskCtx.clearRect(0, 0, userMaskCtx.canvas.width, userMaskCtx.canvas.height);
            let accC = document.getElementById('canvasAccumulatedMask');
            if (accC) accC.getContext('2d').clearRect(0, 0, accC.width, accC.height);
            triggerPipeline(3);
        }

        // ================= 檔案載入優化區塊 =================
        document.getElementById('fileInput').addEventListener('change', (e) => {
            let file = e.target.files[0];
            if (!file) return;
            document.getElementById('status').innerText = "⏳ 讀取記憶體中...";
            document.getElementById('status').style.color = "#d7ba7d";

            if (img.src && img.src.startsWith('blob:')) URL.revokeObjectURL(img.src);
            img.src = URL.createObjectURL(file);
        });

        img.onload = function () {
            if (isProjectLoading) return;
            const MAX_SIZE = 1000;
            let scale = 1;
            if (img.width > MAX_SIZE || img.height > MAX_SIZE) {
                scale = Math.min(MAX_SIZE / img.width, MAX_SIZE / img.height);
            }
            let w = Math.floor(img.width * scale);
            let h = Math.floor(img.height * scale);

            let canvasRaw = document.getElementById('canvasImgRaw');
            canvasRaw.width = w; canvasRaw.height = h;
            canvasRaw.getContext('2d', { willReadFrequently: true }).drawImage(img, 0, 0, w, h);

            document.getElementById('canvasUserMask').width = w;
            document.getElementById('canvasUserMask').height = h;
            document.getElementById('canvasAccumulatedMask').width = w;
            document.getElementById('canvasAccumulatedMask').height = h;

            let view = document.getElementById('viewCanvas');
            let wrapper = document.getElementById('canvasWrapper');
            view.width = wrapper.clientWidth; view.height = wrapper.clientHeight;

            let sX = view.width / w; let sY = view.height / h;
            transform.scale = Math.min(sX, sY) * 0.9;
            transform.x = (view.width - w * transform.scale) / 2;
            transform.y = (view.height - h * transform.scale) / 2;

            roi = { x: 0, y: 0, w: w, h: h };

            if (matRaw) matRaw.delete();
            matRaw = cv.imread(canvasRaw);
            clearUserMask(); triggerPipeline(1);
        };

        window.addEventListener('resize', () => {
            let wrapper = document.getElementById('canvasWrapper');
            let view = document.getElementById('viewCanvas');
            view.width = wrapper.clientWidth; view.height = wrapper.clientHeight;
            drawView();
        });

        // ================= 滑鼠事件與操控 =================
        function getImgCoords(e) {
            let rect = document.getElementById('viewCanvas').getBoundingClientRect();
            return {
                x: (e.clientX - rect.left - transform.x) / transform.scale,
                y: (e.clientY - rect.top - transform.y) / transform.scale
            };
        }

        document.getElementById('canvasWrapper').addEventListener('contextmenu', (e) => {
            e.preventDefault();
            if (fillPreviewActive) { cancelFillPreview(); return; }
            let cm = document.getElementById('contextMenu');
            cm.style.display = 'block'; cm.style.left = e.pageX + 'px'; cm.style.top = e.pageY + 'px';
        });

        document.addEventListener('mousedown', (e) => {
            if (e.button !== 2 && !e.target.closest('#contextMenu')) {
                document.getElementById('contextMenu').style.display = 'none';
            }
        });

        document.getElementById('viewCanvas').addEventListener('wheel', (e) => {
            if (!img.src) return;
            e.preventDefault();

            if (mode === 'fill' && fillPreviewActive) {
                let sl = document.getElementById('slFillTol');
                sl.value = Math.max(0, Math.min(100, parseInt(sl.value) + (e.deltaY < 0 ? 2 : -2)));
                document.getElementById('vFillTol').innerText = sl.value;
                updateFillPreview(); return;
            }
            if (mode === 'draw' || mode === 'erase') {
                let sl = document.getElementById('slBrush');
                sl.value = Math.max(1, Math.min(100, parseInt(sl.value) + (e.deltaY < 0 ? 2 : -2)));
                document.getElementById('vBrush').innerText = sl.value;
                drawView(); return;
            }

            const sf = e.deltaY < 0 ? 1.1 : 1 / 1.1;
            let rect = document.getElementById('viewCanvas').getBoundingClientRect();
            let mx = e.clientX - rect.left, my = e.clientY - rect.top;
            transform.x = mx - (mx - transform.x) * sf;
            transform.y = my - (my - transform.y) * sf;
            transform.scale *= sf;

            transform.scale = Math.max(0.1, Math.min(10.0, transform.scale));
            document.getElementById('slZoom').value = transform.scale;
            document.getElementById('vZoom').innerText = transform.scale.toFixed(1);

            drawView();
        });

        document.getElementById('viewCanvas').addEventListener('mousedown', (e) => {
            if (!img.src || e.button === 2) return;
            isDragging = true;
            let rect = document.getElementById('viewCanvas').getBoundingClientRect();
            mousePos = { x: e.clientX - rect.left, y: e.clientY - rect.top };
            mouseImgPos = getImgCoords(e);

            dragStartScreen = { x: mousePos.x, y: mousePos.y, imgX: mouseImgPos.x, imgY: mouseImgPos.y };

            if (e.button === 1 || mode === 'pan') {
                e.preventDefault(); dragMode = 'pan'; dragStartTransform = { ...transform };
            }
            else if (mode === 'roi') {
                let currentW = document.getElementById('canvasImgRaw').width;
                let currentH = document.getElementById('canvasImgRaw').height;
                let isFullImg = roi && (roi.w >= currentW * 0.95 && roi.h >= currentH * 0.95);
                let hr = 20 / transform.scale;
                let isResize = roi && !isFullImg && (mouseImgPos.x >= roi.x + roi.w - hr && mouseImgPos.x <= roi.x + roi.w + hr && mouseImgPos.y >= roi.y + roi.h - hr && mouseImgPos.y <= roi.y + roi.h + hr);

                if (isResize) {
                    dragMode = 'resize'; dragStartRoi = { ...roi };
                } else if (roi && !isFullImg && mouseImgPos.x >= roi.x && mouseImgPos.x <= roi.x + roi.w && mouseImgPos.y >= roi.y && mouseImgPos.y <= roi.y + roi.h) {
                    dragMode = 'move'; dragStartRoi = { ...roi };
                } else {
                    dragMode = 'drawRoi'; tempRoi = { x1: mouseImgPos.x, y1: mouseImgPos.y, x2: mouseImgPos.x, y2: mouseImgPos.y };
                }
            }
            else if (mode === 'draw' || mode === 'erase') {
                dragMode = 'paint';
                lastPaintPos = { x: mouseImgPos.x, y: mouseImgPos.y };
                applyBrush(mouseImgPos, lastPaintPos);
                triggerPipeline(3, true);
            }
            else if (mode === 'fill') {

            }
        });

        document.getElementById('viewCanvas').addEventListener('mousemove', (e) => {
            if (!img.src) return;
            let rect = document.getElementById('viewCanvas').getBoundingClientRect();
            mousePos = { x: e.clientX - rect.left, y: e.clientY - rect.top };
            mouseImgPos = getImgCoords(e);

            let cur = 'crosshair';
            if (mode === 'pan') cur = isDragging ? 'grabbing' : 'grab';
            else if (mode === 'roi') {
                let currentW = document.getElementById('canvasImgRaw').width;
                let currentH = document.getElementById('canvasImgRaw').height;
                let isFullImg = roi && (roi.w >= currentW * 0.95 && roi.h >= currentH * 0.95);
                let hr = 20 / transform.scale;
                let isResize = roi && !isFullImg && (mouseImgPos.x >= roi.x + roi.w - hr && mouseImgPos.x <= roi.x + roi.w + hr && mouseImgPos.y >= roi.y + roi.h - hr && mouseImgPos.y <= roi.y + roi.h + hr);
                if (isResize) cur = 'se-resize';
                else if (roi && !isFullImg && mouseImgPos.x >= roi.x && mouseImgPos.x <= roi.x + roi.w && mouseImgPos.y >= roi.y && mouseImgPos.y <= roi.y + roi.h) cur = 'move';
            }
            else if (mode === 'draw' || mode === 'erase' || mode === 'fill') cur = 'none';
            document.getElementById('viewCanvas').style.cursor = cur;

            if (isDragging) {
                if (dragMode === 'pan') {
                    transform.x = dragStartTransform.x + (mousePos.x - dragStartScreen.x);
                    transform.y = dragStartTransform.y + (mousePos.y - dragStartScreen.y);
                }
                else if (dragMode === 'resize') {
                    roi.w = Math.max(10, mouseImgPos.x - roi.x);
                    roi.h = Math.max(10, mouseImgPos.y - roi.y);
                    triggerPipeline(4, true);
                }
                else if (dragMode === 'move') {
                    let dx = mouseImgPos.x - dragStartScreen.imgX;
                    let dy = mouseImgPos.y - dragStartScreen.imgY;
                    roi.x = dragStartRoi.x + dx; roi.y = dragStartRoi.y + dy;
                    triggerPipeline(4, true);
                }
                else if (dragMode === 'drawRoi') {
                    tempRoi.x2 = mouseImgPos.x; tempRoi.y2 = mouseImgPos.y;
                }
                else if (dragMode === 'paint') {
                    applyBrush(mouseImgPos, lastPaintPos);
                    lastPaintPos = { x: mouseImgPos.x, y: mouseImgPos.y };
                    triggerPipeline(3, true);
                }
            }
            drawView();
        });

        window.addEventListener('mouseup', (e) => {
            if (!isDragging) return;
            isDragging = false;

            if (dragMode === 'move' || dragMode === 'resize' || dragMode === 'drawRoi') {
                if (dragMode === 'drawRoi' && tempRoi) {
                    let rx = Math.min(tempRoi.x1, tempRoi.x2), ry = Math.min(tempRoi.y1, tempRoi.y2);
                    let rw = Math.abs(tempRoi.x1 - tempRoi.x2), rh = Math.abs(tempRoi.y1 - tempRoi.y2);
                    if (rw > 10 && rh > 10) roi = { x: rx, y: ry, w: rw, h: rh };
                    tempRoi = null;
                }
                if (roi && roi.w > 10 && roi.h > 10) triggerPipeline(4);
            }
            else if (dragMode === 'paint') {
                lastPaintPos = null;
            }
            dragMode = null; drawView();
        });

        document.getElementById('viewCanvas').addEventListener('mouseout', () => { mouseImgPos = null; drawView(); });

        function applyBrush(ic, lastPos) {
            let bs = parseInt(document.getElementById('slBrush').value);

            userMaskCtx.fillStyle = (mode === 'draw') ? 'rgba(255,255,255,1)' : 'rgba(128,128,128,1)';
            userMaskCtx.beginPath(); userMaskCtx.arc(ic.x, ic.y, bs, 0, Math.PI * 2); userMaskCtx.fill();
            if (lastPos && (lastPos.x !== ic.x || lastPos.y !== ic.y)) {
                userMaskCtx.strokeStyle = (mode === 'draw') ? 'rgba(255,255,255,1)' : 'rgba(128,128,128,1)';
                userMaskCtx.lineCap = 'round'; userMaskCtx.lineJoin = 'round'; userMaskCtx.lineWidth = bs * 2;
                userMaskCtx.beginPath(); userMaskCtx.moveTo(lastPos.x, lastPos.y); userMaskCtx.lineTo(ic.x, ic.y); userMaskCtx.stroke();
            }
        }

        // ================= 智慧油漆桶 BFS =================
        function startFillPreview(ic) {
            if (!matPreprocessed || !compMaskData || !roi) return;
            let rx = Math.round(ic.x), ry = Math.round(ic.y);
            if (rx < roi.x || rx >= roi.x + roi.w || ry < roi.y || ry >= roi.y + roi.h) return;

            let lx = rx - Math.floor(roi.x), ly = ry - Math.floor(roi.y);
            let compVal = compMaskData[ly * Math.floor(roi.w) + lx];
            fillTargetType = (compVal > 128) ? 128 : 255;
            fillSeed = { x: lx, y: ly, gX: rx, gY: ry };
            fillPreviewActive = true;
            updateFillPreview();
        }

        function updateFillPreview() {
            if (!fillPreviewActive || !fillSeed) return;
            let w = Math.floor(roi.w), h = Math.floor(roi.h);
            let tol = parseInt(document.getElementById('slFillTol').value);

            let rX = Math.floor(roi.x), rY = Math.floor(roi.y);
            let bgData = bgCanvas.getContext('2d', { willReadFrequently: true }).getImageData(rX, rY, w, h).data;

            let mask = new Uint8Array(w * h); let queue = new Int32Array(w * h);
            let head = 0, tail = 0;
            let startIdx = fillSeed.y * w + fillSeed.x;
            let targetColor = bgData[startIdx * 4];

            queue[tail++] = startIdx; mask[startIdx] = 1;

            while (head < tail) {
                let p = queue[head++];
                let x = p % w, y = Math.floor(p / w);
                let nbs = [p - 1, p + 1, p - w, p + w];
                if (x === 0) nbs[0] = -1; if (x === w - 1) nbs[1] = -1;

                for (let i = 0; i < 4; i++) {
                    let n = nbs[i];
                    if (n >= 0 && n < mask.length && mask[n] === 0) {
                        if (Math.abs(bgData[n * 4] - targetColor) <= tol) { mask[n] = 1; queue[tail++] = n; }
                    }
                }
            }
            fillYellowCanvas.width = w; fillYellowCanvas.height = h;
            let yCtx = fillYellowCanvas.getContext('2d');
            let imgD = yCtx.createImageData(w, h);
            for (let i = 0, j = 0; i < mask.length; i++, j += 4) {
                if (mask[i]) { imgD.data[j] = 255; imgD.data[j + 1] = 255; imgD.data[j + 3] = 150; }
            }
            yCtx.putImageData(imgD, 0, 0); drawView();
        }

        function commitFill() {
            if (!fillPreviewActive || !fillYellowCanvas) return;
            let w = Math.floor(roi.w), h = Math.floor(roi.h);

            lastFillMaskData = userMaskCtx.getImageData(0, 0, userMaskCtx.canvas.width, userMaskCtx.canvas.height);

            let yData = fillYellowCanvas.getContext('2d').getImageData(0, 0, w, h).data;

            let tmpC = document.createElement('canvas'); tmpC.width = w; tmpC.height = h;
            let tCtx = tmpC.getContext('2d');
            let imgD = tCtx.createImageData(w, h);

            for (let i = 0; i < yData.length; i += 4) {
                if (yData[i + 3] > 0) {
                    imgD.data[i] = fillTargetType;
                    imgD.data[i + 1] = fillTargetType;
                    imgD.data[i + 2] = fillTargetType;
                    imgD.data[i + 3] = 255;
                }
            }
            tCtx.putImageData(imgD, 0, 0);
            userMaskCtx.drawImage(tmpC, Math.floor(roi.x), Math.floor(roi.y));

            cancelFillPreview(); triggerPipeline(3);
        }

        function cancelFillPreview() {
            fillPreviewActive = false; fillSeed = null; drawView();
        }

        function accumulateMask() {
            if (!compMaskData || !roi) return;
            let rX = Math.floor(roi.x), rY = Math.floor(roi.y);
            let rW = Math.floor(roi.w), rH = Math.floor(roi.h);

            let accCanvas = document.getElementById('canvasAccumulatedMask');
            let ctx = accCanvas.getContext('2d');

            let tmpC = document.createElement('canvas');
            tmpC.width = rW; tmpC.height = rH;
            let tmpCtx = tmpC.getContext('2d');
            let imgD = tmpCtx.createImageData(rW, rH);
            for (let i = 0; i < compMaskData.length; i++) {
                let v = compMaskData[i];
                imgD.data[i * 4] = v; imgD.data[i * 4 + 1] = v; imgD.data[i * 4 + 2] = v; imgD.data[i * 4 + 3] = 255;
            }
            tmpCtx.putImageData(imgD, 0, 0);

            ctx.globalCompositeOperation = 'source-over';
            ctx.drawImage(tmpC, rX, rY);
            triggerPipeline(3);
            document.getElementById('status').innerText = "✔️ Mask Accumulated";
        }

        // ================= 核心防崩潰 AI 引擎 =================
        function triggerPipeline(level, instant = false, isSliderDrag = false) {
            if (!matPreprocessed && level > 1) return;
            if (instant) {
                let now = Date.now();
                if (now - lastProcTime > 30 && !isProcessing) {
                    isProcessing = true;
                    requestAnimationFrame(() => {
                        executePipeline(level, isSliderDrag);
                        lastProcTime = Date.now();
                        isProcessing = false;
                        if (pendingProcessLevel > 0) {
                            let p = pendingProcessLevel; pendingProcessLevel = 0;
                            setTimeout(() => { triggerPipeline(p, true, isSliderDrag); }, 10);
                        }
                    });
                } else { pendingProcessLevel = pendingProcessLevel > 0 ? Math.min(pendingProcessLevel, level) : level; }
                return;
            }
            document.getElementById('status').innerText = "⚙️ 運算中..."; document.getElementById('status').style.color = "#d7ba7d";
            if (pipeTimer) clearTimeout(pipeTimer);
            pipeTimer = setTimeout(() => { executePipeline(level, false); }, 50);
        }

        function executePipeline(startLevel, usePaddedRoi = false) {
            if (!matRaw || !roi) return;
            let mats = []; function cM() { let m = new cv.Mat(); mats.push(m); return m; }
            try {
                if (startLevel <= 1) {
                    if (matPreprocessed) matPreprocessed.delete();
                    matPreprocessed = new cv.Mat();
                    cv.cvtColor(matRaw, matPreprocessed, cv.COLOR_RGBA2GRAY, 0);

                    if (document.getElementById('chkInv').checked) cv.bitwise_not(matPreprocessed, matPreprocessed);

                    if (document.getElementById('chkClahe').checked) {
                        let claheLimit = parseFloat(document.getElementById('slClahe').value);
                        let tile = new cv.Size(8, 8); mats.push(tile);
                        let clahe = new cv.CLAHE(claheLimit, tile); mats.push(clahe);
                        clahe.apply(matPreprocessed, matPreprocessed);
                    }

                    let d = parseInt(document.getElementById('slDestripe').value);
                    if (d > 0) {
                        let tmp = cM();
                        let k = (d * 2) + 1;
                        cv.medianBlur(matPreprocessed, tmp, k);
                        tmp.copyTo(matPreprocessed);
                    }

                    let sharp = parseFloat(document.getElementById('slSharp').value);
                    if (sharp > 0) {
                        let blur = cM(); cv.GaussianBlur(matPreprocessed, blur, new cv.Size(0, 0), 2.0);
                        cv.addWeighted(matPreprocessed, 1.0 + sharp, blur, -sharp, 0, matPreprocessed);
                    }

                    let alpha = parseFloat(document.getElementById('slAlpha').value);
                    matPreprocessed.convertTo(matPreprocessed, -1, alpha, 0);

                    let gamma = parseFloat(document.getElementById('slGamma').value);
                    if (gamma !== 1.0) {
                        let data = matPreprocessed.data; let lut = new Uint8Array(256);
                        for (let i = 0; i < 256; i++) lut[i] = Math.pow(i / 255.0, 1.0 / gamma) * 255;
                        for (let i = 0; i < data.length; i++) data[i] = lut[data[i]];
                    }

                    let disp = cM(); cv.cvtColor(matPreprocessed, disp, cv.COLOR_GRAY2RGBA);
                    bgCanvas.width = disp.cols; bgCanvas.height = disp.rows;
                    bgCanvas.getContext('2d').putImageData(new ImageData(new Uint8ClampedArray(disp.data), disp.cols, disp.rows), 0, 0);
                }

                let rX = Math.max(0, Math.floor(roi.x)), rY = Math.max(0, Math.floor(roi.y));
                let rW = Math.min(matPreprocessed.cols - rX, Math.floor(roi.w)), rH = Math.min(matPreprocessed.rows - rY, Math.floor(roi.h));
                if (rW <= 10 || rH <= 10) return;

                let pX = 0, pY = 0, pW = matPreprocessed.cols, pH = matPreprocessed.rows;
                if (usePaddedRoi) {
                    let pad = 60;
                    pX = Math.max(0, rX - pad);
                    pY = Math.max(0, rY - pad);
                    pW = Math.min(matPreprocessed.cols - pX, rW + (rX - pX) + pad);
                    pH = Math.min(matPreprocessed.rows - pY, rH + (rY - pY) + pad);
                }
                let pRect = new cv.Rect(pX, pY, pW, pH);

                if (startLevel <= 2) {
                    let mBase = cv.Mat.zeros(pH, pW, cv.CV_8UC1); mats.push(mBase);

                    let roiSrc = matPreprocessed.roi(pRect); mats.push(roiSrc);
                    let kSize = parseInt(document.getElementById('slKernel').value); if (kSize % 2 === 0) kSize++;
                    let kernelBh = cv.getStructuringElement(cv.MORPH_ELLIPSE, new cv.Size(kSize, kSize)); mats.push(kernelBh);
                    let ext = cM(); cv.morphologyEx(roiSrc, ext, cv.MORPH_BLACKHAT, kernelBh);

                    let mSize = parseInt(document.getElementById('slMorph').value);
                    if (mSize > 0) {
                        let d = Math.min(15, mSize * 2 + 1);
                        let tmp = cM();
                        try {
                            cv.bilateralFilter(ext, tmp, d, d * 3, d * 3);
                        } catch (e) {
                            cv.medianBlur(ext, tmp, d);
                        }
                        tmp.copyTo(ext);
                    }

                    let thresh = parseInt(document.getElementById('slThresh').value);

                    if (document.getElementById('chkOtsu').checked) {
                        let tmp = cM(); cv.threshold(ext, tmp, thresh, 255, cv.THRESH_BINARY);
                        cv.bitwise_or(mBase, tmp, mBase);
                    }
                    if (document.getElementById('chkCanny').checked) {
                        let edges = cM(); cv.Canny(ext, edges, Math.max(5, thresh), Math.max(15, thresh * 2));
                        let cm = parseInt(document.getElementById('slCannyM').value); let kc = cv.getStructuringElement(cv.MORPH_ELLIPSE, new cv.Size(cm, cm)); mats.push(kc);
                        cv.morphologyEx(edges, edges, cv.MORPH_CLOSE, kc); cv.bitwise_or(mBase, edges, mBase);
                    }
                    if (document.getElementById('chkAdapt').checked) {
                        let blr = cM(); cv.medianBlur(ext, blr, 7);
                        let tmp = cM(); cv.adaptiveThreshold(blr, tmp, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY, 25, parseInt(document.getElementById('slAdaptC').value));
                        cv.bitwise_or(mBase, tmp, mBase);
                    }

                    if (document.getElementById('chkCanny').checked || document.getElementById('chkAdapt').checked) {
                        let kc = cv.getStructuringElement(cv.MORPH_ELLIPSE, new cv.Size(3, 3)); mats.push(kc);
                        cv.morphologyEx(mBase, mBase, cv.MORPH_OPEN, kc);
                    }

                    baseThreshData = new Uint8Array(mBase.data);
                    baseThreshW = pW;
                    baseThreshH = pH;
                }

                if (startLevel <= 3) {
                    if (!baseThreshData) return;

                    let currentData = new Uint8Array(baseThreshData);
                    let mAI = cM(); mAI.create(baseThreshH, baseThreshW, cv.CV_8UC1); mAI.data.set(currentData);

                    let gap = parseInt(document.getElementById('slGap').value);
                    if (gap > 0) {
                        let kg = cv.getStructuringElement(cv.MORPH_ELLIPSE, new cv.Size(gap % 2 === 0 ? gap + 1 : gap, gap % 2 === 0 ? gap + 1 : gap)); mats.push(kg);
                        cv.morphologyEx(mAI, mAI, cv.MORPH_CLOSE, kg);
                    }

                    let fCnts = new cv.MatVector(), fHier = new cv.Mat(); mats.push(fCnts, fHier);
                    cv.findContours(mAI, fCnts, fHier, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
                    let mValidBlobs = cv.Mat.zeros(baseThreshH, baseThreshW, cv.CV_8UC1); mats.push(mValidBlobs);

                    let minArea = parseFloat(document.getElementById('slArea').value);
                    let minCirc = parseFloat(document.getElementById('slCirc').value);

                    for (let i = 0; i < fCnts.size(); ++i) {
                        let cnt = fCnts.get(i);
                        let area = cv.contourArea(cnt);
                        if (area < minArea) continue;
                        let peri = cv.arcLength(cnt, true);
                        if (peri === 0) continue;
                        if ((4 * Math.PI * area) / (peri * peri) >= minCirc) {
                            cv.drawContours(mValidBlobs, fCnts, i, new cv.Scalar(255, 255, 255, 255), -1, 8, fHier, 0);
                        }
                    }

                    let mFilteredGlobal = cM();
                    cv.bitwise_and(mAI, mValidBlobs, mFilteredGlobal);

                    let userFull = cv.imread(document.getElementById('canvasUserMask')); mats.push(userFull);
                    let uRoi = userFull.roi(pRect); mats.push(uRoi);
                    let uGray = cM(); cv.cvtColor(uRoi, uGray, cv.COLOR_RGBA2GRAY, 0);

                    let uAdd = cM(); cv.threshold(uGray, uAdd, 240, 255, cv.THRESH_BINARY);
                    let tmp1 = cM(); cv.threshold(uGray, tmp1, 100, 255, cv.THRESH_BINARY);
                    let tmp2 = cM(); cv.threshold(uGray, tmp2, 150, 255, cv.THRESH_BINARY_INV);
                    let uSub = cM(); cv.bitwise_and(tmp1, tmp2, uSub);

                    // 疊加已累加的遮罩
                    let accFull = cv.imread(document.getElementById('canvasAccumulatedMask')); mats.push(accFull);
                    let accRoi = accFull.roi(pRect); mats.push(accRoi);
                    let accGray = cM(); cv.cvtColor(accRoi, accGray, cv.COLOR_RGBA2GRAY, 0);
                    cv.bitwise_or(mFilteredGlobal, accGray, mFilteredGlobal);

                    cv.bitwise_or(mFilteredGlobal, uAdd, mFilteredGlobal);
                    cv.bitwise_not(uSub, uSub);
                    cv.bitwise_and(mFilteredGlobal, uSub, mFilteredGlobal);

                    if (document.getElementById('chkSolid').checked) {
                        let sCnts = new cv.MatVector(), sHier = new cv.Mat(); mats.push(sCnts, sHier);
                        cv.findContours(mFilteredGlobal, sCnts, sHier, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
                        cv.drawContours(mFilteredGlobal, sCnts, -1, new cv.Scalar(255), cv.FILLED, 8, sHier, 0);
                    }

                    globalFilteredData = new Uint8Array(mFilteredGlobal.data);
                    globalIsPadded = usePaddedRoi;
                    globalPadX = pX; globalPadY = pY;
                    globalPadW = pW; globalPadH = pH;
                }

                if (startLevel <= 4) {
                    if (!globalFilteredData) return;

                    let cX = rX - globalPadX;
                    let cY = rY - globalPadY;
                    if (cX < 0 || cY < 0 || cX + rW > globalPadW || cY + rH > globalPadH) {
                        triggerPipeline(2);
                        return;
                    }
                    let cropRect = new cv.Rect(cX, cY, rW, rH);

                    let mGlobal = cM(); mGlobal.create(globalPadH, globalPadW, cv.CV_8UC1); mGlobal.data.set(new Uint8Array(globalFilteredData));
                    let mFiltered = cM(); mGlobal.roi(cropRect).copyTo(mFiltered);

                    compMaskData = new Uint8Array(mFiltered.data);

                    let lCnts = new cv.MatVector(), lHier = new cv.Mat(); mats.push(lCnts, lHier);
                    cv.findContours(mFiltered, lCnts, lHier, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                    let colorMat = new cv.Mat(rH, rW, cv.CV_8UC4, new cv.Scalar(0, 0, 0, 0)); mats.push(colorMat);
                    voidLabels = [];
                    let totalPxs = cv.countNonZero(mFiltered);

                    for (let i = 0; i < lCnts.size(); ++i) {
                        let cnt = lCnts.get(i);
                        let M = cv.moments(cnt, false);
                        if (M.m00 > 0) voidLabels.push({ area: M.m00, cx: M.m10 / M.m00, cy: M.m01 / M.m00 });
                    }
                    voidLabels.sort((a, b) => b.area - a.area);

                    let outData = colorMat.data;
                    let inData = mFiltered.data;
                    for (let i = 0, j = 0; i < inData.length; i++, j += 4) {
                        if (inData[i] > 0) {
                            outData[j] = 255;
                            outData[j + 1] = 0;
                            outData[j + 2] = 0;
                            outData[j + 3] = 255;
                        }
                    }

                    resultCanvas.width = rW; resultCanvas.height = rH;
                    resultCanvas.getContext('2d', { willReadFrequently: true }).putImageData(new ImageData(new Uint8ClampedArray(colorMat.data), rW, rH), 0, 0);

                    lastDrawnRoi = { x: rX, y: rY };
                    currentVoidRate = (totalPxs / (rW * rH)) * 100 || 0;

                    document.getElementById('voidResult').innerText = getTxt('void_lbl').replace("{0:.2f}", currentVoidRate.toFixed(2));

                    updateResultColor(); drawView();
                    document.getElementById('status').innerText = getTxt('status_ready'); document.getElementById('status').style.color = "#89d185";
                }

            } catch (e) {
                console.error("Pipeline Error:", e); document.getElementById('status').innerText = getTxt('status_error'); document.getElementById('status').style.color = "#f14c4c";
            } finally { mats.forEach(m => { try { m.delete(); } catch (err) { } }); }
        }

        // ================= 其他功能 =================
        function autoHeuristicSearch() {
            if (!isCvReady || !roi || !matPreprocessed) return;
            document.getElementById('status').innerText = getTxt('status_ai_busy');
            let mats = [];
            try {
                let rX = Math.max(0, Math.floor(roi.x)), rY = Math.max(0, Math.floor(roi.y));
                let rW = Math.min(matPreprocessed.cols - rX, Math.floor(roi.w)), rH = Math.min(matPreprocessed.rows - rY, Math.floor(roi.h));
                if (rW <= 10 || rH <= 10) {
                    document.getElementById('status').innerText = getTxt('status_ready');
                    document.getElementById('status').style.color = "#89d185";
                    return;
                }
                let rect = new cv.Rect(rX, rY, rW, rH);

                let roiSrc = matPreprocessed.roi(rect).clone(); mats.push(roiSrc);
                let ext = new cv.Mat(), blr = new cv.Mat(), mask = new cv.Mat(); mats.push(ext); mats.push(blr); mats.push(mask);

                let ks = parseInt(document.getElementById('slKernel').value); if (ks % 2 === 0) ks++;
                let kbh = cv.getStructuringElement(cv.MORPH_ELLIPSE, new cv.Size(ks, ks)); mats.push(kbh);
                cv.morphologyEx(roiSrc, ext, cv.MORPH_BLACKHAT, kbh);

                try {
                    cv.bilateralFilter(ext, blr, 9, 30, 30);
                } catch (e) {
                    cv.medianBlur(ext, blr, 9);
                }

                let otsu = 15;
                try {
                    let typeOtsu = cv.THRESH_OTSU || 8;
                    otsu = cv.threshold(blr, mask, 0, 255, cv.THRESH_BINARY | typeOtsu);
                } catch (err) {
                    console.warn("Otsu failed, fallback to 15");
                }

                let best = Math.min(100, Math.max(1, Math.floor(otsu * 0.85)));

                document.getElementById('chkOtsu').checked = true;
                document.getElementById('slThresh').value = best; document.getElementById('vThresh').innerText = best;
                document.getElementById('slMorph').value = 2; document.getElementById('vMorph').innerText = 2;
                document.getElementById('slArea').value = 10; document.getElementById('vArea').innerText = 10;
                document.getElementById('slCirc').value = 0.15; document.getElementById('vCirc').innerText = "0.15";

                triggerPipeline(2);
            } catch (e) {
                let msg = e;
                try { if (typeof e === 'number') msg = cv.exceptionFromPtr(e).msg; } catch (err) { }
                console.error("AutoHeuristic Error:", msg);
                document.getElementById('status').innerText = getTxt('status_ai_fail') + msg;
                document.getElementById('status').style.color = "#f14c4c";
            } finally { mats.forEach(m => { try { m.delete(); } catch (err) { } }); }
        }

        // ================= 終極渲染器 =================
        function drawView() {
            let view = document.getElementById('viewCanvas');
            let ctx = view.getContext('2d');
            ctx.imageSmoothingEnabled = false;
            ctx.clearRect(0, 0, view.width, view.height);
            if (!img.src) return;

            ctx.save();
            ctx.translate(transform.x, transform.y);
            ctx.scale(transform.scale, transform.scale);

            let baseImageSource = bgCanvas.width > 0 ? bgCanvas : document.getElementById('canvasImgRaw');
            ctx.drawImage(baseImageSource, 0, 0);

            if (document.getElementById('chkShowMask').checked && resultCanvas.width > 0 && lastDrawnRoi && !fillPreviewActive) {
                ctx.globalAlpha = parseFloat(document.getElementById('slOpacity').value);
                ctx.drawImage(resultCanvas, lastDrawnRoi.x, lastDrawnRoi.y);
                ctx.globalAlpha = 1.0;
            }

            if (fillPreviewActive && fillYellowCanvas.width > 0 && roi) {
                ctx.globalAlpha = parseFloat(document.getElementById('slOpacity').value);
                ctx.drawImage(resultCanvas, lastDrawnRoi.x, lastDrawnRoi.y);

                ctx.globalAlpha = 0.8;
                ctx.drawImage(fillYellowCanvas, Math.floor(roi.x), Math.floor(roi.y));
                ctx.globalAlpha = 1.0;
            }

            if (document.getElementById('chkShowLabels').checked && voidLabels.length > 0 && lastDrawnRoi) {
                let totalArea = roi.w * roi.h; let fs = 14 / transform.scale;
                ctx.font = `bold ${fs}px Arial`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                voidLabels.forEach((v, idx) => {
                    let text = `${idx + 1}(${(v.area / totalArea * 100).toFixed(1)}%)`;
                    let px = lastDrawnRoi.x + v.cx, py = lastDrawnRoi.y + v.cy;
                    ctx.strokeStyle = '#000'; ctx.lineWidth = 3 / transform.scale; ctx.strokeText(text, px, py);
                    ctx.fillStyle = '#ff0'; ctx.fillText(text, px, py);
                });
            }

            if (mode === 'roi') {
                if (roi) {
                    ctx.fillStyle = '#ff0'; let rSize = 10 / transform.scale;
                    ctx.fillRect(roi.x + roi.w - rSize / 2, roi.y + roi.h - rSize / 2, rSize, rSize);
                }
                if (tempRoi) {
                    let rw = Math.abs(tempRoi.x1 - tempRoi.x2), rh = Math.abs(tempRoi.y1 - tempRoi.y2);
                    if (rw > 5 && rh > 5) {
                        ctx.strokeStyle = '#0ff'; ctx.lineWidth = 2 / transform.scale; ctx.setLineDash([5 / transform.scale, 5 / transform.scale]);
                        ctx.strokeRect(Math.min(tempRoi.x1, tempRoi.x2), Math.min(tempRoi.y1, tempRoi.y2), rw, rh);
                        ctx.setLineDash([]);
                    }
                }
            }

            if (roi) {
                ctx.strokeStyle = '#89d185'; ctx.lineWidth = 2 / transform.scale;
                ctx.strokeRect(roi.x, roi.y, roi.w, roi.h);
            }

            ctx.restore();

            if (mousePos && mouseImgPos && !isDragging) {
                ctx.beginPath();
                if (mode === 'pan') {
                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
                    ctx.moveTo(mousePos.x - 8, mousePos.y); ctx.lineTo(mousePos.x + 8, mousePos.y);
                    ctx.moveTo(mousePos.x, mousePos.y - 8); ctx.lineTo(mousePos.x, mousePos.y + 8);
                } else if (mode === 'roi') {
                    let currentW = document.getElementById('canvasImgRaw').width;
                    let currentH = document.getElementById('canvasImgRaw').height;
                    let isFullImg = roi && (roi.w >= currentW * 0.95 && roi.h >= currentH * 0.95);
                    let hr = 20 / transform.scale;
                    let isResize = roi && !isFullImg && (mouseImgPos.x >= roi.x + roi.w - hr && mouseImgPos.x <= roi.x + roi.w + hr && mouseImgPos.y >= roi.y + roi.h - hr && mouseImgPos.y <= roi.y + roi.h + hr);
                    if (!isResize) {
                        ctx.strokeStyle = '#0ff'; ctx.lineWidth = 1;
                        ctx.moveTo(mousePos.x - 12, mousePos.y); ctx.lineTo(mousePos.x + 12, mousePos.y);
                        ctx.moveTo(mousePos.x, mousePos.y - 12); ctx.lineTo(mousePos.x, mousePos.y + 12);
                    }
                } else if (mode === 'draw' || mode === 'erase') {
                    let bs = parseInt(document.getElementById('slBrush').value) * transform.scale;
                    ctx.arc(mousePos.x, mousePos.y, bs, 0, Math.PI * 2);
                    ctx.strokeStyle = mode === 'draw' ? '#ff0' : '#ff69b4'; ctx.lineWidth = 1.5;
                } else if (mode === 'fill') {
                    ctx.strokeStyle = '#0f0'; ctx.lineWidth = 2;
                    ctx.moveTo(mousePos.x - 8, mousePos.y); ctx.lineTo(mousePos.x + 8, mousePos.y);
                    ctx.moveTo(mousePos.x, mousePos.y - 8); ctx.lineTo(mousePos.x, mousePos.y + 8);
                }
                ctx.stroke();
            }

            if (fillPreviewActive && fillSeed) {
                ctx.save(); ctx.translate(transform.x, transform.y); ctx.scale(transform.scale, transform.scale);
                ctx.strokeStyle = '#f00'; ctx.lineWidth = 2 / transform.scale;
                let sx = Math.floor(roi.x) + fillSeed.gX, sy = Math.floor(roi.y) + fillSeed.gY;
                ctx.beginPath(); ctx.moveTo(sx - 10 / transform.scale, sy); ctx.lineTo(sx + 10 / transform.scale, sy);
                ctx.moveTo(sx, sy - 10 / transform.scale); ctx.lineTo(sx, sy + 10 / transform.scale);
                ctx.stroke(); ctx.restore();
            }
        }

        // ================= 匯出報表功能 =================
        function exportReport() {
            if (!img.src || !roi || resultCanvas.width <= 0) {
                alert(getTxt('load_warn_img'));
                return;
            }

            let rX = Math.floor(roi.x), rY = Math.floor(roi.y);
            let rW = Math.floor(roi.w), rH = Math.floor(roi.h);

            let expCanvas = document.createElement('canvas');
            let ctx = expCanvas.getContext('2d');

            let now = new Date();
            let dateStr = `${now.getFullYear()}/${now.getMonth() + 1}/${now.getDate()}`;
            let textLine = `Void rate : ${currentVoidRate.toFixed(2)}%   ${dateStr}`;

            let fontSize = Math.max(12, Math.floor(rW * 0.04));
            ctx.font = `bold ${fontSize}px "Segoe UI", Tahoma, sans-serif`;
            let textWidth = ctx.measureText(textLine).width;

            if (textWidth > rW * 0.95) {
                fontSize = Math.floor(fontSize * (rW * 0.95) / textWidth);
            }

            let finalW = rW;
            if (fontSize < 12) {
                fontSize = 12;
                ctx.font = `bold ${fontSize}px "Segoe UI", Tahoma, sans-serif`;
                finalW = Math.max(rW, Math.floor(ctx.measureText(textLine).width + 20));
            }

            let showWm = document.getElementById('chkWatermark').checked;
            let footerHeight = showWm ? Math.floor(fontSize * 2.5) : 0;
            expCanvas.width = finalW;
            expCanvas.height = rH + footerHeight;

            ctx.fillStyle = '#181818';
            ctx.fillRect(0, 0, finalW, expCanvas.height);

            let offsetX = Math.floor((finalW - rW) / 2);

            let baseImg = bgCanvas.width > 0 ? bgCanvas : document.getElementById('canvasImgRaw');
            ctx.drawImage(baseImg, rX, rY, rW, rH, offsetX, 0, rW, rH);

            if (document.getElementById('chkShowMask').checked && resultCanvas.width > 0) {
                ctx.globalAlpha = parseFloat(document.getElementById('slOpacity').value);
                ctx.drawImage(resultCanvas, 0, 0, rW, rH, offsetX, 0, rW, rH);
                ctx.globalAlpha = 1.0;
            }

            if (document.getElementById('chkShowLabels').checked && voidLabels.length > 0) {
                let totalArea = rW * rH;
                ctx.font = `bold ${Math.max(10, fontSize * 0.8)}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                voidLabels.forEach((v, idx) => {
                    let text = `${idx + 1}(${(v.area / totalArea * 100).toFixed(1)}%)`;
                    let px = offsetX + v.cx, py = v.cy;
                    ctx.strokeStyle = '#000'; ctx.lineWidth = Math.max(2, fontSize * 0.1); ctx.strokeText(text, px, py);
                    ctx.fillStyle = '#ff0'; ctx.fillText(text, px, py);
                });
            }

            if (showWm) {
                ctx.fillStyle = '#89d185';
                ctx.font = `bold ${fontSize}px "Segoe UI", Tahoma, sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(textLine, finalW / 2, rH + footerHeight / 2);
            }

            expCanvas.toBlob(async function (blob) {
                let timeStamp = `${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}_${String(now.getHours()).padStart(2, '0')}${String(now.getMinutes()).padStart(2, '0')}`;
                let defaultName = `VoidReport_${timeStamp}.jpg`;

                if (window.showSaveFilePicker) {
                    try {
                        const handle = await window.showSaveFilePicker({
                            suggestedName: defaultName,
                            types: [{
                                description: 'JPEG Image',
                                accept: { 'image/jpeg': ['.jpg', '.jpeg'] },
                            }],
                        });
                        const writable = await handle.createWritable();
                        await writable.write(blob);
                        await writable.close();
                        alert(getTxt('export_success'));
                    } catch (err) {
                        if (err.name !== 'AbortError') {
                            console.error(err);
                            alert(getTxt('save_fail_report') + err.message);
                        }
                    }
                } else {
                    let url = URL.createObjectURL(blob);
                    let a = document.createElement('a');
                    a.href = url;
                    a.download = defaultName;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    setTimeout(() => alert(getTxt('export_success')), 100);
                }
            }, 'image/jpeg', 0.98);
        }

        function setZoomFromSlider(val) {
            let newSf = parseFloat(val);

            let view = document.getElementById('viewCanvas');
            let mx = view.width / 2;

        function getTxt(key) {
            return I18N_DICT[currentLang][key] || key;
        }

        function walkText(node, dict, fromLang, toLang) {
            if (node.nodeType === 3) {
                let text = node.nodeValue.trim();
                if (text) {
                    let key = Object.keys(dict[fromLang]).find(k => dict[fromLang][k] === text);
                    if (key && dict[toLang] && dict[toLang][key]) {
                        node.nodeValue = node.nodeValue.replace(text, dict[toLang][key]);
                    }
                }
            } else if (node.nodeType === 1 && node.nodeName !== "SCRIPT" && node.nodeName !== "STYLE") {
                for (let i = 0; i < node.childNodes.length; i++) {
                    walkText(node.childNodes[i], dict, fromLang, toLang);
                }
            }
        }

        function toggleLangMenu() {
            let m = document.getElementById('langMenu');
            if (m) m.style.display = m.style.display === 'none' ? 'block' : 'none';
        }
        document.addEventListener('click', function (e) {
            if (!e.target.closest('#menu-lang')) {
                let m = document.getElementById('langMenu');
                if (m) m.style.display = 'none';
            }
        });

        function setLang(lang, e) {
            if (e) e.stopPropagation();
            let lm = document.getElementById('langMenu');
            if (lm) lm.style.display = 'none';
            if (lang === currentLang) return;

            walkText(document.body, I18N_DICT, currentLang, lang);

            let ml = document.getElementById('menu-lang');
            const langNames = {
                'zh-TW': '繁體中文', 'zh-CN': '简体中文', 'en': 'English',
                'ja': '日本語', 'ko': '한국어', 'fr': 'Français', 'de': 'Deutsch'
            };
            let label = (lang === 'en' || lang === 'fr' || lang === 'de') ? '🌐 Lang ▼' : '🌐 語言 ▼';
            if (ml) {
                let menuHtml = label + '\n<div id="langMenu" style="display: none; position: absolute; top: 100%; left: 0; background: #333; border: 1px solid #454545; z-index: 1000; min-width: 100px;">';
                for (let k in langNames) {
                    menuHtml += `<div class="cm-item" onclick="setLang('${k}', event)">${langNames[k]}</div>`;
                }
                menuHtml += '</div>';
                ml.innerHTML = menuHtml;
            }

            currentLang = lang;
            document.title = getTxt('title');
            document.getElementById('status').innerText = getTxt('status_ready');

            // 更新右鍵選單
            document.getElementById('cm-pan').innerText = getTxt('rm_pan');
            document.getElementById('cm-roi').innerText = getTxt('rm_roi');
            document.getElementById('cm-draw').innerText = getTxt('rm_draw');
            document.getElementById('cm-erase').innerText = getTxt('rm_erase');
            document.getElementById('cm-fill').innerText = getTxt('rm_fill');

            // 強制更新帶有 Emoji 的功能按鈕
            if (document.getElementById('btn-auto-opt')) document.getElementById('btn-auto-opt').innerText = getTxt('l12');
            if (document.getElementById('btn-accumulate')) document.getElementById('btn-accumulate').innerText = getTxt('l13');

            // 更新空洞率標籤文字
            if (img.src) {
                document.getElementById('voidResult').innerText = getTxt('void_lbl').replace("{0:.2f}", currentVoidRate.toFixed(2));
            }
        }

        function showHelp() {
            alert(getTxt('guide'));
        }
